services:

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: coatingminer_api
    ports:
      - '8000:8000'
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: coatingminer_redis
    ports:
      - '6379:6379'